# 自动构建并发布 APK 到 GitHub Releases
# 触发条件：推送 tag（如 v1.0.0）或手动触发

name: Build and Release

on:
  push:
    tags:
      - 'v*'   # 推送 v1.0.0、v1.0.1 等 tag 时自动触发
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write  # 需要创建 Release 的权限

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 赋予 gradlew 执行权限
        run: chmod +x ./gradlew

      - name: 构建 Debug APK
        run: ./gradlew assembleDebug

      - name: 构建 Release APK
        run: ./gradlew assembleRelease
        env:
          # 如需自动签名，请配置以下 Secrets：
          # SIGNING_KEYSTORE_BASE64: 将 keystore 文件 base64 编码后的值
          # KEYSTORE_PASSWORD: keystore 密码
          # KEY_ALIAS: 密钥别名
          # KEY_PASSWORD: 密钥密码
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: 提取版本信息
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="v1.0.0-ci-$(date +'%Y%m%d-%H%M%S')"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "版本: $VERSION"

      - name: 创建 GitHub Release 并上传 APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: 家庭相册 ${{ steps.version.outputs.version }}
          body: |
            ## 家庭相册 ${{ steps.version.outputs.version }}

            ### 📱 安装说明
            - 下载 `app-debug.apk` 安装即可
            - 支持 Android 5.0 及以上设备
            - 支持手机、平板、Android TV

            ### ✨ 更新内容
            - 见 [CHANGELOG.md](CHANGELOG.md) 或 Commit 记录

            ### 📦 文件说明
            | 文件 | 说明 |
            |------|------|
            | app-debug.apk | 调试版（已签名，可直接安装）|
            | app-release.apk | 正式版（若签名配置完成）|

            ---
            > 如有问题，欢迎提交 Issue！
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
